<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Socket.IO Test Client</title>
    <script src="https://cdn.socket.io/4.7.2/socket.io.min.js"></script>
    <style>
        body {
            font-family: Arial, sans-serif;
            max-width: 800px;
            margin: 50px auto;
            padding: 20px;
        }
        .container {
            border: 1px solid #ddd;
            padding: 20px;
            border-radius: 8px;
        }
        input, button {
            padding: 10px;
            margin: 5px;
            font-size: 14px;
        }
        #messages {
            border: 1px solid #ccc;
            height: 300px;
            overflow-y: auto;
            padding: 10px;
            margin: 10px 0;
            background: #f9f9f9;
        }
        .message {
            padding: 5px;
            margin: 5px 0;
            border-radius: 4px;
        }
        .sent {
            background: #d4edda;
            text-align: right;
        }
        .received {
            background: #d1ecf1;
        }
        .system {
            background: #fff3cd;
            font-style: italic;
        }
        .status {
            padding: 10px;
            margin: 10px 0;
            border-radius: 4px;
        }
        .connected {
            background: #d4edda;
            color: #155724;
        }
        .disconnected {
            background: #f8d7da;
            color: #721c24;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>Socket.IO Test Client</h1>
        
        <div id="status" class="status disconnected">Disconnected</div>
        
        <div>
            <h3>Connection</h3>
            <input type="text" id="serverUrl" placeholder="Server URL" value="http://localhost:5002">
            <input type="text" id="token" placeholder="JWT Token (optional)">
            <button onclick="connect()">Connect</button>
            <button onclick="disconnect()">Disconnect</button>
        </div>

        <div>
            <h3>Send Message</h3>
            <input type="text" id="recipientId" placeholder="Recipient User ID">
            <input type="text" id="messageContent" placeholder="Message">
            <button onclick="sendMessage()">Send</button>
        </div>

        <div>
            <h3>Messages</h3>
            <div id="messages"></div>
        </div>

        <div>
            <h3>Actions</h3>
            <button onclick="startTyping()">Start Typing</button>
            <button onclick="stopTyping()">Stop Typing</button>
            <button onclick="clearMessages()">Clear Messages</button>
        </div>
    </div>

    <script>
        let socket = null;

        function addMessage(text, type = 'system') {
            const messagesDiv = document.getElementById('messages');
            const messageDiv = document.createElement('div');
            messageDiv.className = `message ${type}`;
            messageDiv.textContent = `[${new Date().toLocaleTimeString()}] ${text}`;
            messagesDiv.appendChild(messageDiv);
            messagesDiv.scrollTop = messagesDiv.scrollHeight;
        }

        function updateStatus(connected) {
            const statusDiv = document.getElementById('status');
            if (connected) {
                statusDiv.textContent = `Connected (ID: ${socket.id})`;
                statusDiv.className = 'status connected';
            } else {
                statusDiv.textContent = 'Disconnected';
                statusDiv.className = 'status disconnected';
            }
        }

        function connect() {
            const serverUrl = document.getElementById('serverUrl').value;
            const token = document.getElementById('token').value;

            const options = {
                auth: {}
            };

            if (token) {
                options.auth.token = token;
            }

            socket = io(serverUrl, options);

            socket.on('connect', () => {
                updateStatus(true);
                addMessage('Connected to server', 'system');
            });

            socket.on('disconnect', () => {
                updateStatus(false);
                addMessage('Disconnected from server', 'system');
            });

            socket.on('connect_error', (error) => {
                addMessage(`Connection error: ${error.message}`, 'system');
            });

            // Listen for incoming messages
            socket.on('message:receive', (data) => {
                addMessage(`From ${data.senderUsername}: ${data.content}`, 'received');
            });

            socket.on('message:sent', (data) => {
                addMessage(`Sent to ${data.recipientId}: ${data.content}`, 'sent');
            });

            // User status events
            socket.on('user:online', (data) => {
                addMessage(`${data.username} is online`, 'system');
            });

            socket.on('user:offline', (data) => {
                addMessage(`${data.username} is offline`, 'system');
            });

            // Typing events
            socket.on('typing:user', (data) => {
                addMessage(`${data.username} is typing...`, 'system');
            });

            socket.on('typing:stop', (data) => {
                addMessage(`User ${data.userId} stopped typing`, 'system');
            });
        }

        function disconnect() {
            if (socket) {
                socket.disconnect();
                socket = null;
            }
        }

        function sendMessage() {
            if (!socket || !socket.connected) {
                alert('Not connected to server');
                return;
            }

            const recipientId = parseInt(document.getElementById('recipientId').value);
            const content = document.getElementById('messageContent').value;

            if (!recipientId || !content) {
                alert('Please enter recipient ID and message');
                return;
            }

            socket.emit('message:send', {
                recipientId: recipientId,
                content: content
            });

            document.getElementById('messageContent').value = '';
        }

        function startTyping() {
            if (!socket || !socket.connected) {
                alert('Not connected to server');
                return;
            }

            const recipientId = parseInt(document.getElementById('recipientId').value);
            if (!recipientId) {
                alert('Please enter recipient ID');
                return;
            }

            socket.emit('typing:start', { recipientId: recipientId });
            addMessage('Started typing indicator', 'system');
        }

        function stopTyping() {
            if (!socket || !socket.connected) {
                alert('Not connected to server');
                return;
            }

            const recipientId = parseInt(document.getElementById('recipientId').value);
            if (!recipientId) {
                alert('Please enter recipient ID');
                return;
            }

            socket.emit('typing:stop', { recipientId: recipientId });
            addMessage('Stopped typing indicator', 'system');
        }

        function clearMessages() {
            document.getElementById('messages').innerHTML = '';
        }

        // Handle Enter key in message input
        document.getElementById('messageContent').addEventListener('keypress', (e) => {
            if (e.key === 'Enter') {
                sendMessage();
            }
        });
    </script>
</body>
</html>
